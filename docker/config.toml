default_provider = "ollama"
default_model = "qwen3.5:9b"
api_url = "http://your_ip:11434/"
api_key = "ollama-ai"
default_temperature = 0.2
provider_timeout_secs = 120
model_routes = []
embedding_routes = []

[model_providers]

[extra_headers]

[observability]
backend = "log"
runtime_trace_mode = "rolling"
runtime_trace_path = "state/runtime-trace.jsonl"
runtime_trace_max_entries = 200

[autonomy]
level = "full"
workspace_only = false
allowed_commands = ["*"]
forbidden_paths = [
    "/etc",
    "/root",
    "/home",
    "/usr",
    "/bin",
    "/sbin",
    "/lib",
    "/opt",
    "/boot",
    "/dev",
    "/proc",
    "/sys",
    "/var",
    "/tmp",
    "~/.ssh",
    "~/.gnupg",
    "~/.aws",
    "~/.config",
]
max_actions_per_hour = 300
max_cost_per_day_cents = 500
require_approval_for_medium_risk = false
block_high_risk_commands = false
shell_env_passthrough = []  # NoDoc 允许 shell 工具子进程使用的额外环境变量。
auto_approve = ["*"]
always_ask = []
allowed_roots = ["/zeroclaw-data"]
non_cli_excluded_tools = [] # NoDoc 在非 CLI 渠道（如 Telegram、Discord）中排除的工具。

[security.sandbox]
backend = "none" # 不使用沙箱（最快，仅应用层）
firejail_args = [] # NoDoc 沙箱自定义指令

[security.resources]
max_memory_mb = 512
max_cpu_time_seconds = 60
max_subprocesses = 10
memory_monitoring = true # 资源看门狗

[security.audit] # 审计日志
enabled = true
log_path = "~/.config/zeroclaw/audit.log"
max_size_mb = 100
sign_events = true

[security.otp] # OTP 门控
enabled = false 
method = "totp"
token_ttl_secs = 30
cache_valid_secs = 300
gated_actions = [] # 受 OTP 保护的工具操作
gated_domains = [] # 需要 OTP 的显式域模式
gated_domain_categories = [] # 域预设类别（`banking`、`medical`、`government`、`identity_providers`）

[security.estop] # 紧急停止状态机和 CLI, 用于在 AI 失控时立即切断所有执行权限。
enabled = false
state_file = "~/.zeroclaw/estop-state.json"
require_otp_to_resume = true

[security.nevis] # NoDoc 身份与访问管理
enabled = false
instance_url = ""
realm = "master"
client_id = ""
token_validation = "local"
role_mapping = []
require_mfa = false
session_timeout_secs = 3600

[backup] # NoDoc 备份
enabled = true
max_keep = 10
include_dirs = [
    "config",
    "memory",
    "audit",
    "knowledge",
]
destination_dir = "state/backups"
compress = true
encrypt = false

[data_retention] # NoDoc 隐私与磁盘空间管家
enabled = false
retention_days = 90
dry_run = false # 开启回收站则不执行实际删除
categories = [] # 清理类别 empty = all

[cloud_ops]  # NoDoc 自动化运维底座
enabled = false
default_cloud = "aws"
supported_clouds = [
    "aws",
    "azure",
    "gcp",
]
iac_tools = ["terraform"]
cost_threshold_monthly_usd = 100.0
well_architected_frameworks = ["aws-waf"]

[conversational_ai] # NoDoc 对话式 AI 引擎
enabled = false
default_language = "en"
supported_languages = [
    "en",
    "de",
    "fr",
    "it",
]
auto_detect_language = true
escalation_confidence_threshold = 0.3 # 升级/转人工的置信度阈值。
max_conversation_turns = 50
conversation_timeout_secs = 1800
analytics_enabled = false

[security_ops] # NoDoc 托管网络安全服务配置
enabled = false
playbooks_dir = "~/.zeroclaw/playbooks"
auto_triage = false
require_approval_for_actions = true
max_auto_severity = "low"
report_output_dir = "~/.zeroclaw/security-reports"

[runtime] # 对于本身在 Docker 中的 claw 则是“套娃”
kind = "native" # 运行时执行的运行环境类型 (native | docker) 
reasoning_enabled = false

[runtime.docker] # NoDoc 容器参数
image = "alpine:3.20"
network = "bridge"
memory_limit_mb = 512
cpu_limit = 2.0
read_only_rootfs = true
mount_workspace = true
allowed_workspace_roots = []

[reliability] # NoDoc 容错重试机制
provider_retries = 2
provider_backoff_ms = 500
fallback_providers = []
api_keys = []
channel_initial_backoff_secs = 2
channel_max_backoff_secs = 60
scheduler_poll_secs = 15
scheduler_retries = 2

[reliability.model_fallbacks] # NoDoc 

[scheduler] # NoDoc 任务调度器
enabled = true
max_tasks = 64 # 最大任务总数
max_concurrent = 4 # 同时执行的最大任务数

[agent]
compact_context = true
max_tool_iterations = 80
max_history_messages = 50
max_context_tokens = 32768
parallel_tools = false # 在单次迭代中启用并行工具执行
tool_dispatcher = "auto"
tool_call_dedup_exempt = [] # 免除轮次内重复调用抑制的工具名称
tool_filter_groups = [] # MCP 工具模式过滤组

[skills]
open_skills_enabled = true
prompt_injection_mode = "compact" # 技能提示详细程度：`full`（内联指令/工具）或 `compact`（仅名称/描述/位置）

[skills.skill_creation]
enabled = true # 启用在成功完成多步任务后自动创建技能的功能
max_skills = 500 # 保留的自动生成技能的最大数量
similarity_threshold = 0.85 # 去重的嵌入向量（Embedding）相似度阈值

[query_classification] # 自动模型提示路由
enabled = false
rules = []

[heartbeat] # NoDoc 健康检查（心跳)
enabled = false
interval_minutes = 30
two_phase = true
adaptive = false
min_interval_minutes = 5
max_interval_minutes = 120
deadman_timeout_minutes = 0
max_run_history = 100

[cron]
enabled = true
max_run_history = 50

[channels_config]
cli = true
message_timeout_secs = 300
ack_reactions = true # 启用确认反馈
show_tool_calls = true
